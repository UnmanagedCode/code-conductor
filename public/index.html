<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content" />
  <title>claude-orch</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <button id="sidebar-toggle" aria-label="toggle sidebar" aria-controls="sidebar" aria-expanded="false">≡</button>
    <div id="sidebar-scrim"></div>
    <aside id="sidebar">
      <header>
        <h1>claude-orch</h1>
        <button id="notify-toggle" title="Browser notifications when a turn finishes" aria-pressed="false">🔕</button>
      </header>
      <div id="sidebar-body">
        <div class="sidebar-actions">
          <button id="new-project-btn">+ New project</button>
        </div>
        <ul id="project-list" class="project-list"></ul>
      </div>
      <footer id="sidebar-footer">
        <div id="sidebar-status" class="sidebar-status" aria-live="polite"></div>
        <button id="restart-server-btn" type="button" class="sidebar-footer-btn"
                title="Restart the orchestrator process (picks up source-code changes)">
          ⟲ Restart server
        </button>
      </footer>
    </aside>
    <main id="main">
      <header id="instance-header">
        <div id="instance-title">no instance selected</div>
        <div id="instance-controls">
          <select id="mode-select" disabled>
            <option value="bypassPermissions">code</option>
            <option value="ask">ask</option>
            <option value="plan">plan</option>
          </select>
          <button id="kill-btn" disabled>Interrupt</button>
          <button id="resume-btn" hidden>Resume</button>
          <button id="sync-btn" hidden title="Bring this worktree up to date with its parent branch (fast-forward when possible, otherwise ask the agent to rebase)">Sync</button>
          <button id="merge-btn" hidden title="Fast-forward the parent branch onto this worktree's tip">Merge</button>
          <div id="overflow-menu" class="overflow-menu" hidden>
            <button id="overflow-toggle" type="button" aria-haspopup="menu" aria-expanded="false" title="More actions">⋮</button>
            <div id="overflow-panel" class="overflow-panel" hidden role="menu">
              <button id="auto-approve-plan-btn" type="button" role="menuitemcheckbox" aria-checked="false" title="When on, ExitPlanMode is auto-approved without a confirmation card. Session-local; per instance.">📋 Auto-approve plans: off</button>
              <button id="debug-btn" type="button" role="menuitem" title="Start mirroring CLI stdin/stdout/stderr to .claude-orch-app/debug/&lt;id&gt;/ for offline inspection">🐛 Debug</button>
            </div>
          </div>
        </div>
      </header>
      <div id="conversation" class="conversation"></div>
      <div id="task-panel" hidden></div>
      <div id="turn-indicator" class="turn-indicator" hidden aria-live="polite">
        <div id="ti-left" class="ti-left" hidden>
          <span class="ti-dot" aria-hidden="true"></span>
          <span class="ti-label">Claude is working</span>
          <span class="ti-ellipsis" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>
        </div>
        <div id="ti-usage-slot" class="ti-right"></div>
      </div>
      <form id="composer" autocomplete="off">
        <div id="composer-attachments" class="composer-attachments" hidden></div>
        <div class="composer-row">
          <textarea id="composer-input" placeholder="Send a message — Enter to send, Shift+Enter for newline" rows="2" disabled></textarea>
          <input id="composer-file" type="file" multiple hidden />
          <button id="composer-attach" type="button" class="composer-attach" title="Attach files (images or any file)" disabled>+</button>
          <button id="composer-send" type="submit" disabled>Send</button>
        </div>
      </form>
    </main>
  </div>

  <dialog id="new-project-dialog">
    <form method="dialog">
      <h3>New project</h3>
      <label>Name <input id="np-name" pattern="[a-zA-Z0-9._-]+" required autofocus /></label>
      <p class="hint">Creates <code id="np-preview">~/project/&lt;name&gt;</code></p>
      <p class="error" id="np-error"></p>
      <menu>
        <button value="cancel" formnovalidate>Cancel</button>
        <button id="np-create" value="create">Create</button>
      </menu>
    </form>
  </dialog>

  <dialog id="new-instance-dialog">
    <form method="dialog">
      <h3>New session in <span id="ni-project"></span></h3>
      <label>Mode
        <select id="ni-mode">
          <option value="plan" selected>plan (read-only — propose a plan first)</option>
          <option value="ask">ask (prompt before destructive tools)</option>
          <option value="bypassPermissions">code (full power, no prompts)</option>
        </select>
      </label>
      <label>Effort (controls thinking budget)
        <select id="ni-effort">
          <option value="low">low</option>
          <option value="medium">medium</option>
          <option value="high" selected>high</option>
          <option value="xhigh">xhigh</option>
          <option value="max">max</option>
        </select>
      </label>
      <label>Thinking
        <select id="ni-thinking">
          <option value="adaptive" selected>adaptive (Claude decides)</option>
          <option value="enabled">enabled</option>
          <option value="disabled">disabled</option>
        </select>
      </label>
      <label>Model
        <select id="ni-model">
          <option value="" selected>(default)</option>
          <option value="claude-sonnet-4-6">claude-sonnet-4-6 (visible thinking)</option>
          <option value="claude-opus-4-7">claude-opus-4-7 (thinking is internal/redacted)</option>
          <option value="claude-haiku-4-5">claude-haiku-4-5</option>
          <option value="sonnet">sonnet (alias)</option>
          <option value="opus">opus (alias)</option>
          <option value="haiku">haiku (alias)</option>
        </select>
      </label>
      <label class="ni-worktree-row">
        <input type="checkbox" id="ni-worktree" />
        <span>Run in isolated git worktree</span>
      </label>
      <p class="hint" id="ni-worktree-hint"></p>
      <label class="ni-temp-row">
        <input type="checkbox" id="ni-temp" />
        <span>Temp session (don't persist transcript)</span>
      </label>
      <p class="hint">defaults mode to code; jsonl is removed when the session ends</p>
      <label class="ni-temp-row">
        <input type="checkbox" id="ni-debug" />
        <span>Debug mode (capture stdin/stdout/stderr to disk)</span>
      </label>
      <p class="hint">writes to <code>&lt;cwd&gt;/.claude-orch-app/debug/&lt;instance-id&gt;/</code> for sharing back to a maintainer</p>
      <p class="error" id="ni-error"></p>
      <menu>
        <button value="cancel">Cancel</button>
        <button id="ni-create" value="create">Spawn</button>
      </menu>
    </form>
  </dialog>

  <script type="module" src="/app.js"></script>
</body>
</html>
